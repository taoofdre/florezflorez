<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Products — Florez Florez</title>
  <style>
    @font-face {
      font-family: 'IBM Plex Mono';
      src: url('/fonts/IBMPlexMono-SemiBold.ttf') format('truetype');
      font-weight: 600;
      font-style: normal;
    }
    @font-face {
      font-family: 'IBM Plex Mono';
      src: url('/fonts/IBMPlexMono-Regular.ttf') format('truetype');
      font-weight: 400;
      font-style: normal;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'IBM Plex Mono', monospace;
      background: #fff;
      color: #333;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    .toolbar {
      position: sticky;
      top: 0;
      z-index: 10;
      background: #fff;
      border-bottom: 1px solid rgba(0,0,0,0.1);
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      gap: 1.5rem;
      flex-wrap: wrap;
    }

    .toolbar h1 {
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(0,0,0,0.35);
      margin-right: auto;
    }

    .toolbar a {
      color: rgba(0,0,0,0.35);
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      text-decoration: none;
      transition: color 0.2s;
    }
    .toolbar a:hover { color: #333; }

    .btn {
      display: inline-block;
      padding: 0.5rem 1.5rem;
      font-family: inherit;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #fff;
      background: #333;
      border: none;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s;
    }
    .btn:hover { background: #555; }
    .btn-outline {
      color: rgba(0,0,0,0.35);
      background: #fff;
      border: 1px solid rgba(0,0,0,0.2);
    }
    .btn-outline:hover { background: rgba(0,0,0,0.04); color: #333; border-color: rgba(0,0,0,0.35); }

    .status {
      font-size: 0.8rem;
      color: rgba(0,0,0,0.4);
      min-height: 1.2em;
    }
    .status.error { color: #c44; }

    /* Auth overlay */
    .auth-overlay {
      position: fixed;
      inset: 0;
      background: #fff;
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
    }
    .auth-overlay h2 {
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(0,0,0,0.35);
    }
    .auth-overlay button {
      padding: 0.75rem 2.5rem;
      font-family: inherit;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #fff;
      background: #333;
      border: none;
      cursor: pointer;
      transition: background 0.2s;
    }
    .auth-overlay button:hover { background: #555; }

    /* Filter bar */
    .filters {
      display: flex;
      gap: 0.5rem;
      padding: 1.5rem 2rem 0;
      max-width: 900px;
      margin: 0 auto;
    }
    .filter-btn {
      padding: 0.3rem 0.8rem;
      font-family: inherit;
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      border: 1px solid rgba(0,0,0,0.15);
      background: transparent;
      color: rgba(0,0,0,0.4);
      cursor: pointer;
      transition: all 0.2s;
    }
    .filter-btn:hover { border-color: rgba(0,0,0,0.35); color: #333; }
    .filter-btn.active { background: #333; color: #fff; border-color: #333; }

    /* Product list */
    .page {
      max-width: 900px;
      margin: 0 auto;
      padding: 1.5rem 2rem 6rem;
    }

    .product-row {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.75rem 0;
      border-bottom: 1px solid rgba(0,0,0,0.06);
      text-decoration: none;
      color: inherit;
      transition: background 0.15s;
    }
    .product-row:hover { background: rgba(0,0,0,0.02); }

    .product-thumb {
      width: 48px;
      height: 48px;
      object-fit: cover;
      flex-shrink: 0;
      background: #f2f2f2;
    }
    .product-thumb-empty {
      width: 48px;
      height: 48px;
      flex-shrink: 0;
      background: #f2f2f2;
    }

    .product-name {
      flex: 1;
      font-size: 0.85rem;
      font-weight: 600;
      color: #333;
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .product-cat {
      flex-shrink: 0;
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(0,0,0,0.3);
      width: 90px;
    }

    .product-price {
      font-size: 0.8rem;
      font-weight: 400;
      color: rgba(0,0,0,0.45);
      width: 70px;
      flex-shrink: 0;
      text-align: right;
    }

    .badge {
      flex-shrink: 0;
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.2rem 0.6rem;
      border-radius: 2px;
    }
    .badge-active { background: rgba(40,160,80,0.1); color: #1a7a3a; }
    .badge-hidden { background: rgba(0,0,0,0.06); color: rgba(0,0,0,0.35); }

    .loading {
      padding: 4rem 0;
      text-align: center;
      font-size: 0.8rem;
      color: rgba(0,0,0,0.3);
      letter-spacing: 0.1em;
    }

    .empty-msg {
      padding: 2rem 0;
      font-size: 0.8rem;
      color: rgba(0,0,0,0.3);
    }
  </style>
</head>
<body>

  <div id="auth-overlay" class="auth-overlay" style="display:none;">
    <h2>Sign in to use this tool</h2>
    <button id="auth-btn">Sign in with GitHub</button>
  </div>

  <div class="toolbar">
    <h1>Products</h1>
    <a href="/admin/">Back to Admin</a>
    <a class="btn btn-outline" href="/admin/products/edit.html">Add Product</a>
    <span class="status" id="status"></span>
  </div>

  <div class="filters" id="filters">
    <button class="filter-btn active" data-cat="all">All</button>
  </div>

  <div class="page" id="page">
    <div class="loading">Loading products...</div>
  </div>

  <script>
    (() => {
      const REPO = 'taoofdre/florezflorez';
      const SPECIAL_SECTIONS = ['consulting', 'about'];
      let SECTIONS = [];
      const isLocal = location.hostname === 'localhost' || location.hostname === '127.0.0.1';

      const authOverlay = document.getElementById('auth-overlay');
      const authBtn = document.getElementById('auth-btn');
      const statusEl = document.getElementById('status');
      const page = document.getElementById('page');

      let ghToken = null;
      let allProducts = [];
      let activeFilter = 'all';

      function setStatus(msg, type) {
        statusEl.textContent = msg;
        statusEl.className = 'status' + (type ? ' ' + type : '');
      }

      // ---- Auth ----

      function getStoredToken() {
        return sessionStorage.getItem('gh_token') || localStorage.getItem('gh_token');
      }
      function storeToken(t) { sessionStorage.setItem('gh_token', t); }

      function initAuth() {
        if (isLocal) { loadAll(); return; }
        const stored = getStoredToken();
        if (stored) { ghToken = stored; loadAll(); return; }
        authOverlay.style.display = '';
        authBtn.addEventListener('click', () => {
          const popup = window.open('/api/auth', 'github-auth', 'width=600,height=700');
          window.addEventListener('message', function onMsg(e) {
            if (typeof e.data !== 'string') return;
            if (e.data.startsWith('authorization:github:success:')) {
              const payload = JSON.parse(e.data.replace('authorization:github:success:', ''));
              ghToken = payload.token;
              storeToken(ghToken);
              authOverlay.style.display = 'none';
              window.removeEventListener('message', onMsg);
              if (popup) popup.close();
              loadAll();
            }
          });
          const interval = setInterval(() => {
            if (popup && !popup.closed) popup.postMessage('authorizing:github', '*');
            else clearInterval(interval);
          }, 250);
        });
      }

      // ---- GitHub file loading ----

      async function loadFile(file) {
        if (ghToken) {
          const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${file}`, {
            headers: { Authorization: 'token ' + ghToken },
          });
          if (!res.ok) throw new Error('Failed to load ' + file);
          const f = await res.json();
          return JSON.parse(atob(f.content.replace(/\n/g, '')));
        } else {
          const res = await fetch('/' + file + '?t=' + Date.now());
          if (!res.ok) throw new Error('Failed to load ' + file);
          return await res.json();
        }
      }

      // ---- Render ----

      function formatPrice(v) {
        const n = (v || '').toString().replace(/[^0-9.]/g, '');
        return n ? '$' + n : '';
      }

      function renderList() {
        const filtered = activeFilter === 'all'
          ? allProducts
          : allProducts.filter(p => p._cat === activeFilter);

        page.innerHTML = '';
        if (filtered.length === 0) {
          page.innerHTML = '<p class="empty-msg">No products found.</p>';
          return;
        }

        filtered.forEach(p => {
          const a = document.createElement('a');
          a.className = 'product-row';
          a.href = '/admin/products/edit.html?cat=' + p._cat + '&id=' + encodeURIComponent(p.id);

          if (p.images && p.images.length > 0) {
            const img = document.createElement('img');
            img.className = 'product-thumb';
            img.src = p.images[0].src;
            img.alt = p.images[0].alt || p.title;
            a.appendChild(img);
          } else {
            const ph = document.createElement('div');
            ph.className = 'product-thumb-empty';
            a.appendChild(ph);
          }

          const name = document.createElement('span');
          name.className = 'product-name';
          name.textContent = p.title || '(untitled)';
          a.appendChild(name);

          const cat = document.createElement('span');
          cat.className = 'product-cat';
          cat.textContent = p._catLabel;
          a.appendChild(cat);

          const price = document.createElement('span');
          price.className = 'product-price';
          price.textContent = formatPrice(p.price_display) || '\u2014';
          a.appendChild(price);

          const badge = document.createElement('span');
          badge.className = 'badge ' + (p.for_sale ? 'badge-active' : 'badge-hidden');
          badge.textContent = p.for_sale ? 'For Sale' : 'Hidden';
          a.appendChild(badge);

          page.appendChild(a);
        });
      }

      async function loadAll() {
        page.innerHTML = '<div class="loading">Loading products...</div>';
        setStatus('');

        try {
          // Load categories from homepage.json
          const homepage = await loadFile('content/homepage.json');
          SECTIONS = (homepage.categories || [])
            .filter(c => !SPECIAL_SECTIONS.includes(c.slug))
            .map(c => ({
              key: c.slug,
              label: c.label.charAt(0) + c.label.slice(1).toLowerCase(),
              file: 'content/' + c.slug + '.json',
            }));

          // Build filter buttons
          const filtersEl = document.getElementById('filters');
          filtersEl.innerHTML = '<button class="filter-btn active" data-cat="all">All</button>';
          SECTIONS.forEach(s => {
            const btn = document.createElement('button');
            btn.className = 'filter-btn';
            btn.dataset.cat = s.key;
            btn.textContent = s.label;
            filtersEl.appendChild(btn);
          });

          const results = await Promise.all(SECTIONS.map(s => loadFile(s.file).catch(() => ({ pieces: [] }))));
          allProducts = [];
          SECTIONS.forEach((section, i) => {
            const pieces = results[i].pieces || [];
            pieces.forEach(p => {
              allProducts.push({ ...p, _cat: section.key, _catLabel: section.label });
            });
          });
          renderList();
        } catch (e) {
          page.innerHTML = '';
          setStatus('Failed to load products: ' + e.message, 'error');
        }
      }

      // ---- Filters ----

      document.getElementById('filters').addEventListener('click', (e) => {
        const btn = e.target.closest('.filter-btn');
        if (!btn) return;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeFilter = btn.dataset.cat;
        renderList();
      });

      initAuth();
    })();
  </script>
</body>
</html>
