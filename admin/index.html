<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Content Manager — Florez Florez</title>
</head>
<body>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script>
    // Decap CMS looks for config.yml at the page root by default.
    // This ensures it finds it in /admin/config.yml.
    if (window.CMS) {
      window.CMS.init({ config: { load_config_file: true, config_url: '/admin/config.yml' } });
    }
  </script>
</body>
</html>
